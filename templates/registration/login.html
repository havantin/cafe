<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Coffee House</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #000;
        }

        .auth-wrapper {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://png.pngtree.com/thumb_back/fh260/back_our/20190619/ourmid/pngtree-fancy-coffee-background-material-image_134209.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.03); /* Làm mờ tối hơn để chữ nổi */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 60px 45px;
            width: 100%;
            max-width: 440px;
            color: white;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        .login-box h2 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 2.2rem;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .login-box h2 span {
            color: #d35400;
            font-style: italic;
        }

        .form-group {
            text-align: left;
            margin-bottom: 22px;
        }

        .form-group label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            display: block;
            color: rgba(255,255,255,0.5);
            font-weight: 600;
        }

        .login-box input {
            background: rgba(255, 255, 255, 0.08) !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px 18px;
            width: 100%;
            color: white !important;
            transition: 0.3s;
        }

        .login-box input:focus {
            outline: none;
            border-color: #d35400;
            background: rgba(255, 255, 255, 0.12) !important;
            box-shadow: 0 0 15px rgba(211, 84, 0, 0.2);
        }

        .login-box input::placeholder {
            color: rgba(255,255,255,0.3);
        }

        .btn-login {
            background: #d35400;
            border: none;
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            color: white;
            font-weight: 700;
            margin-top: 15px;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-login:hover {
            background: #e67e22;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(211, 84, 0, 0.3);
        }

        .register-link {
            margin-top: 30px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
        }

        .register-link a {
            color: #d35400;
            text-decoration: none;
            font-weight: 700;
            margin-left: 5px;
        }

        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="auth-wrapper">
    <div class="login-box">
        <h2>Hương Vị <span>Đích Thực</span></h2>
        <p style="font-size: 0.85rem; color: rgba(255,255,255,0.4); margin-bottom: 40px; font-weight: 300; letter-spacing: 0.5px;">
            Đăng nhập để bắt đầu hành trình cà phê của bạn
        </p>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Tên đăng nhập</label>
                <input type="text" name="username" placeholder="Tên của bạn..." required>
            </div>
            
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" name="password" placeholder="********" required>
            </div>

            <button type="submit" class="btn-login">Vào Cửa Hàng</button>
            
            <div class="register-link">
                Bạn chưa có tài khoản? <a href="{% url 'register' %}">Gia nhập ngay</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
